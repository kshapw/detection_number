worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_time":"$upstream_response_time"'
        '}';
    access_log /var/log/nginx/access.log json_combined;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;  # hide nginx version

    # ── Upload size cap ───────────────────────────────────────────────────────
    client_max_body_size 10m;
    client_body_timeout 30s;
    client_header_timeout 10s;
    send_timeout 30s;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # API endpoints: 30 req/s per IP, burst 60
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    # Health/probe endpoints: 10 req/s per IP (prevent trivial flood)
    limit_req_zone $binary_remote_addr zone=probe:5m rate=10r/s;
    limit_req_status 429;

    # ── Gzip for JSON responses ───────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 512;

    upstream app_backend {
        server app:8000;
        keepalive 32;
    }

    server {
        listen 8080;
        server_name _;

        # ── Security headers ──────────────────────────────────────────────────
        add_header X-Content-Type-Options      "nosniff"              always;
        add_header X-Frame-Options             "DENY"                 always;
        add_header X-XSS-Protection            "1; mode=block"        always;
        add_header Referrer-Policy             "no-referrer"          always;
        add_header Content-Security-Policy     "default-src 'none'"   always;
        add_header Permissions-Policy          "geolocation=(), camera=(), microphone=()" always;
        add_header Strict-Transport-Security   "max-age=31536000; includeSubDomains" always;

        # ── Health / readiness probes (light rate-limit) ──────────────────────
        location ~ ^/(health|ready)$ {
            limit_req zone=probe burst=20 nodelay;
            proxy_pass http://app_backend;
            proxy_set_header Host $host;
            proxy_read_timeout 10s;
            access_log off;
        }

        # ── Prometheus metrics — internal networks only ───────────────────────
        location /metrics {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 127.0.0.1;
            deny all;

            proxy_pass http://app_backend;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── API endpoints ─────────────────────────────────────────────────────
        location / {
            limit_req zone=api burst=60 nodelay;

            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            proxy_connect_timeout 10s;
        }
    }
}
