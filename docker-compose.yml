services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: phone-detection:latest
    restart: unless-stopped
    ports:
      - "8080:8000"
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      WORKERS: "2"
      LOG_LEVEL: "info"
      DETECT_USE_GPU: "true"
      DETECT_OCR_LANG: "en"
      DETECT_OCR_CONFIDENCE_THRESHOLD: "0.6"
      DETECT_DEFAULT_PHONE_REGION: "IN"
      DETECT_ENABLE_DOCS: "false"
      DETECT_CORS_ORIGINS: '["http://localhost:3000","https://localhost:3000","https://kbocwwb.karmikakendra.gov.in","https://apikbocwwb.kbocwwb.karmikakendra.com","https://staging.ksk.metahos.com"]'
    volumes:
      - paddle_models:/models
      - paddle_home:/home/appuser/.paddleocr
      - app_tmp:/tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  paddle_models:
    driver: local
  paddle_home:
    driver: local
  app_tmp:
    driver: local
