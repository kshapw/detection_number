services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: phone-detection:latest
    container_name: detection_number-app-1

    restart: unless-stopped

    ports:
      - "8080:8000"

    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      WORKERS: "1"
      LOG_LEVEL: "info"

      # OCR settings
      DETECT_USE_GPU: "false"
      DETECT_OCR_LANG: "en"
      DETECT_DEFAULT_PHONE_REGION: "IN"
      # Higher thresholds → fewer detected text regions → fewer recognition passes → faster
      DETECT_OCR_DET_DB_THRESH: "0.5"
      DETECT_OCR_DET_DB_BOX_THRESH: "0.6"

    volumes:
      - paddle_models:/models
      - paddle_home:/home/appuser/.paddleocr
      - app_tmp:/tmp

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  paddle_models:
  paddle_home:
  app_tmp:
